<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Dark navy → dark blue diagonal background -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#0B1120"/>
      <stop offset="100%" stop-color="#0F2557"/>
    </linearGradient>

    <!-- Blue gradient for K arms: lighter at top, deeper at bottom -->
    <linearGradient id="armGrad" x1="0" y1="96" x2="0" y2="416" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#93C5FD"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bgGrad)"/>

  <!-- Subtle cadence ring behind the K -->
  <circle cx="268" cy="256" r="198" fill="none" stroke="#3B82F6" stroke-width="2" opacity="0.14"/>

  <!-- K · vertical stem (white, slightly rounded) -->
  <rect x="108" y="96" width="86" height="320" rx="6" fill="white"/>

  <!-- K · upper diagonal arm (blue gradient)
       corners: stem-junction-top (194,220), arm-tip-top (400,96),
                arm-tip-bottom (400,167), notch (194,256) -->
  <polygon points="194,220 400,96 400,167 194,256" fill="url(#armGrad)"/>

  <!-- K · lower diagonal arm (blue gradient, mirror of upper)
       corners: notch (194,256), arm-tip-top (400,345),
                arm-tip-bottom (400,416), stem-junction-bottom (194,292) -->
  <polygon points="194,256 400,345 400,416 194,292" fill="url(#armGrad)"/>
</svg>
