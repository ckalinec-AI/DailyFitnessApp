<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#111827"/>

  <!-- Bicycle wheel outer ring -->
  <circle cx="256" cy="256" r="180" stroke="#3B82F6" stroke-width="20" fill="none"/>

  <!-- Hub -->
  <circle cx="256" cy="256" r="28" fill="#3B82F6"/>
  <circle cx="256" cy="256" r="14" fill="#111827"/>

  <!-- Spokes (8 spokes at 45° increments) -->
  <line x1="256" y1="228" x2="256" y2="96"  stroke="#3B82F6" stroke-width="8" stroke-linecap="round"/>
  <line x1="256" y1="284" x2="256" y2="416" stroke="#3B82F6" stroke-width="8" stroke-linecap="round"/>
  <line x1="228" y1="256" x2="96"  y2="256" stroke="#3B82F6" stroke-width="8" stroke-linecap="round"/>
  <line x1="284" y1="256" x2="416" y2="256" stroke="#3B82F6" stroke-width="8" stroke-linecap="round"/>
  <line x1="236" y1="236" x2="149" y2="149" stroke="#3B82F6" stroke-width="8" stroke-linecap="round"/>
  <line x1="276" y1="276" x2="363" y2="363" stroke="#3B82F6" stroke-width="8" stroke-linecap="round"/>
  <line x1="276" y1="236" x2="363" y2="149" stroke="#3B82F6" stroke-width="8" stroke-linecap="round"/>
  <line x1="236" y1="276" x2="149" y2="363" stroke="#3B82F6" stroke-width="8" stroke-linecap="round"/>

  <!-- Accent glow ring (inner) -->
  <circle cx="256" cy="256" r="148" stroke="#60A5FA" stroke-width="4" fill="none" stroke-dasharray="16 24" stroke-linecap="round"/>

  <!-- "C" wordmark at bottom-right — subtle brand mark -->
  <text x="340" y="420" font-family="Inter, system-ui, sans-serif" font-size="72" font-weight="800"
        fill="#60A5FA" opacity="0.85" text-anchor="middle">K</text>
</svg>
