<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kadence — Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #111827;
      color: #F9FAFB;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .icon { font-size: 3rem; margin-bottom: 1.5rem; }
    h1 { font-size: 1.5rem; font-weight: 800; color: #F9FAFB; margin-bottom: 0.5rem; }
    p { font-size: 0.875rem; color: #6B7280; line-height: 1.6; max-width: 280px; }
    .btn {
      display: inline-block;
      margin-top: 2rem;
      padding: 0.75rem 2rem;
      background: #3B82F6;
      color: white;
      border: none;
      border-radius: 0.75rem;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
    }
    .note {
      position: fixed;
      bottom: 2rem;
      font-size: 0.75rem;
      color: #374151;
    }
  </style>
</head>
<body>
  <div class="icon">🚴</div>
  <h1>You're offline</h1>
  <p>Kadence needs a connection to sync your Whoop data. Your training plan and weight log are available.</p>
  <a href="/" class="btn">Return to App</a>
  <p class="note">Kadence · 47-Mile Road Race · Aug 1, 2026</p>
</body>
</html>
