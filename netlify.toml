# Note: Set these environment variables in the Netlify UI under Site Settings > Environment Variables:
#   WHOOP_CLIENT_SECRET   — server-side Whoop OAuth secret (never expose in client code)
#   VITE_WHOOP_CLIENT_ID  — Whoop OAuth client ID (safe to expose in client)
#   VITE_WHOOP_REDIRECT_URI — must match the redirect URI registered in your Whoop app
#   PIRATE_WEATHER_API_KEY — server-side Pirate Weather key (never expose in client code)

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
